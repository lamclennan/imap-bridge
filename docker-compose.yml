services:
  imap-bridge:
    build: .
    container_name: imap-bridge
    restart: unless-stopped

    volumes:
      # Persistent SQLite state
      - ./data:/app/data

      # Runtime config — edit on the host, restart container to apply
      - ./config.json:/app/config.json:ro

      # OAuth2 client credentials (read-only)
      - ./client_secret.json:/app/client_secret.json:ro

      # Token cache — writable so the bridge can persist refreshed tokens
      - ./tokens:/app/tokens

    # Run the OAuth2 first-time authorisation flow interactively:
    #   docker compose run --rm imap-bridge
    # This prints an auth URL, accepts the pasted code, and writes the token
    # to ./tokens/. After that, normal `docker compose up -d` runs unattended.

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
